<!DOCTYPE html>
<html class="dark" lang="pt-BR">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>TechOps | Calendário de Prazos</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "surface-container-low": "#141b2b",
                        "surface-container": "#191f2f",
                        "primary": "#b8c4ff",
                        "tertiary": "#ffb59a",
                        "surface": "#0c1322",
                        "outline-variant": "#434653",
                        "on-surface": "#dce2f7",
                        "on-surface-variant": "#c3c6d5",
                        "background": "#0c1322"
                    },
                    fontFamily: { "headline": ["Manrope"], "body": ["Inter"] },
                },
            },
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        h1, h2, h3 { font-family: 'Manrope', sans-serif; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; background: rgba(67, 70, 83, 0.2); border: 1px solid rgba(67, 70, 83, 0.2); border-radius: 12px; overflow: hidden; }
        .calendar-day { min-height: 120px; background: #141b2b; padding: 8px; transition: background 0.2s; }
        .calendar-day:hover { background: #191f2f; }
        .calendar-day.not-current { opacity: 0.3; }
        .calendar-day.today { background: rgba(184, 196, 255, 0.05); }
        .calendar-day.today .day-number { background: #b8c4ff; color: #002584; }
        .day-number { width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; border-radius: 99px; font-size: 11px; font-weight: 700; margin-bottom: 8px; }
        .task-badge { font-size: 9px; padding: 2px 6px; border-radius: 4px; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; border-left: 2px solid; }
        .task-badge.todo { background: rgba(195, 198, 213, 0.1); border-color: #8d909e; color: #c3c6d5; }
        .task-badge.progress { background: rgba(184, 196, 255, 0.1); border-color: #b8c4ff; color: #b8c4ff; }
        .task-badge.done { background: rgba(185, 199, 223, 0.1); border-color: #ffb59a; color: #ffb59a; }
    </style>
</head>
<body class="bg-surface text-on-surface">
    <!-- SideNavBar -->
    <aside class="h-screen w-64 fixed left-0 top-0 overflow-y-auto bg-[#141b2b] flex flex-col py-6 z-50">
        <div class="px-6 mb-10">
            <h1 class="text-xl font-bold text-[#dde1ff] tracking-tight">TechOps</h1>
            <p class="text-[10px] uppercase tracking-wider text-on-surface-variant font-medium">Portal de Gerenciamento</p>
        </div>
        <nav class="flex-1 space-y-1">
            <a class="flex items-center gap-3 px-4 py-3 text-[#c3c6d5] opacity-70 hover:bg-[#191f2f] hover:opacity-100 transition-all duration-200" href="/dashboard">
                <span class="material-symbols-outlined" data-icon="dashboard">dashboard</span>
                <span class="text-sm font-label uppercase tracking-widest">Dashboard</span>
            </a>
            <a class="flex items-center gap-3 px-4 py-3 text-[#c3c6d5] opacity-70 hover:bg-[#191f2f] hover:opacity-100 transition-all duration-200" href="/orders">
                <span class="material-symbols-outlined" data-icon="assignment">assignment</span>
                <span class="text-sm font-label uppercase tracking-widest">Ordens</span>
            </a>
            <a class="flex items-center gap-3 px-4 py-3 text-[#c3c6d5] opacity-70 hover:bg-[#191f2f] hover:opacity-100 transition-all duration-200" href="/kanban">
                <span class="material-symbols-outlined" data-icon="view_kanban">view_kanban</span>
                <span class="text-sm font-label uppercase tracking-widest">Kanban</span>
            </a>
            <a class="flex items-center gap-3 px-4 py-3 text-[#dde1ff] font-bold relative after:absolute after:left-0 after:w-1 after:h-6 after:bg-[#b8c4ff] after:rounded-r-full after:shadow-[0_0_8px_#b8c4ff] bg-[#191f2f]" href="/calendar">
                <span class="material-symbols-outlined" data-icon="calendar_today">calendar_today</span>
                <span class="text-sm font-label uppercase tracking-widest">Calendário</span>
            </a>
            <a class="flex items-center gap-3 px-4 py-3 text-[#c3c6d5] opacity-70 hover:bg-[#191f2f] hover:opacity-100 transition-all duration-200" href="/settings">
                <span class="material-symbols-outlined" data-icon="settings">settings</span>
                <span class="text-sm font-label uppercase tracking-widest">Configurações</span>
            </a>
            <a class="flex items-center gap-3 px-4 py-3 text-[#c3c6d5] opacity-70 hover:bg-[#191f2f] hover:opacity-100 transition-all duration-200 mt-auto" href="/" id="logoutBtn">
                <span class="material-symbols-outlined" data-icon="logout">logout</span>
                <span class="text-sm font-label uppercase tracking-widest">Sair</span>
            </a>
        </nav>
    </aside>

    <!-- TopNavBar -->
    <header class="fixed top-0 right-0 left-64 h-16 z-40 bg-[#0c1322]/80 backdrop-blur-xl flex justify-between items-center px-8 w-full border-b border-outline-variant/10">
        <div class="flex items-center gap-4 text-on-surface-variant">
            <span class="material-symbols-outlined" data-icon="calendar_month">calendar_month</span>
            <span class="text-sm font-bold uppercase tracking-widest text-[#dde1ff]">Cronograma de Entregas</span>
        </div>
        <div class="flex items-center gap-6">
            <div id="userGreeting" class="text-sm font-semibold text-[#dde1ff]">Admin</div>
            <div class="h-8 w-8 rounded-full bg-primary-container/20 flex items-center justify-center border border-primary/20">
                <span class="material-symbols-outlined text-primary text-sm">person</span>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="ml-64 mt-16 p-8 min-h-screen">
        <div class="flex flex-col md:flex-row justify-between items-start md:items-end gap-4 mb-10">
            <div>
                <h2 class="text-3xl font-headline font-extrabold text-on-surface tracking-tight">Calendário de Prazos</h2>
                <p id="currentMonthYear" class="text-primary font-bold uppercase text-xs tracking-[0.2em] mt-1"></p>
            </div>
            <div class="flex items-center gap-2">
                <button onclick="changeMonth(-1)" class="p-2 hover:bg-surface-container rounded-lg text-on-surface-variant transition-colors">
                    <span class="material-symbols-outlined">chevron_left</span>
                </button>
                <button onclick="goToToday()" class="px-4 py-2 hover:bg-surface-container text-xs font-bold uppercase tracking-widest text-[#dde1ff] rounded-lg transition-colors">Hoje</button>
                <button onclick="changeMonth(1)" class="p-2 hover:bg-surface-container rounded-lg text-on-surface-variant transition-colors">
                    <span class="material-symbols-outlined">chevron_right</span>
                </button>
            </div>
        </div>

        <!-- Weekly Header -->
        <div class="grid grid-cols-7 mb-2 px-2 text-center text-[10px] font-bold text-on-surface-variant tracking-widest uppercase">
            <div>Dom</div><div>Seg</div><div>Ter</div><div>Qua</div><div>Qui</div><div>Sex</div><div>Sáb</div>
        </div>

        <div id="calendarGrid" class="calendar-grid">
            <!-- Days will be generated by JS -->
        </div>
    </main>

    <script>
        // Auth check
        if (!localStorage.getItem('techops_user')) {
            window.location.href = '/';
        }

        document.getElementById('userGreeting').textContent = localStorage.getItem('techops_user') || 'Admin';

        // Logout logic
        document.getElementById('logoutBtn').addEventListener('click', (e) => {
            e.preventDefault();
            localStorage.removeItem('techops_user');
            window.location.href = '/';
        });

        let currentDate = new Date();
        let tasks = [];

        async function fetchTasks() {
            try {
                const res = await fetch('/api/tarefas');
                tasks = await res.json();
                renderCalendar();
            } catch (err) {
                console.error('Erro ao buscar tarefas:', err);
            }
        }

        function renderCalendar() {
            const grid = document.getElementById('calendarGrid');
            const monthYearLabel = document.getElementById('currentMonthYear');
            grid.innerHTML = '';

            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();

            const monthNames = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];
            monthYearLabel.textContent = `${monthNames[month]} ${year}`;

            const firstDayOfMonth = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const daysInPrevMonth = new Date(year, month, 0).getDate();

            // Previous month days balance
            for (let i = firstDayOfMonth - 1; i >= 0; i--) {
                const day = daysInPrevMonth - i;
                createDayElement(day, false, true);
            }

            // Current month days
            const today = new Date();
            for (let day = 1; day <= daysInMonth; day++) {
                const isToday = today.getDate() === day && today.getMonth() === month && today.getFullYear() === year;
                createDayElement(day, isToday, false);
            }

            // Next month days balance (to fill 6 rows if needed, or just 42 cells)
            const totalCells = 42;
            const remainingCells = totalCells - (firstDayOfMonth + daysInMonth);
            for (let i = 1; i <= remainingCells; i++) {
                createDayElement(i, false, true);
            }
        }

        function createDayElement(day, isToday, isNotCurrent) {
            const grid = document.getElementById('calendarGrid');
            const dayDiv = document.createElement('div');
            dayDiv.className = `calendar-day ${isNotCurrent ? 'not-current' : ''} ${isToday ? 'today' : ''}`;
            
            const numDiv = document.createElement('div');
            numDiv.className = 'day-number';
            numDiv.textContent = day;
            dayDiv.appendChild(numDiv);

            if (!isNotCurrent) {
                const currentYear = currentDate.getFullYear();
                const currentMonth = (currentDate.getMonth() + 1).toString().padStart(2, '0');
                const dateStr = `${currentYear}-${currentMonth}-${day.toString().padStart(2, '0')}`;
                
                // Simplified date matching (since prazo is stored as DATE)
                const dayTasks = tasks.filter(t => t.prazo && t.prazo.startsWith(dateStr));
                
                const badgeContainer = document.createElement('div');
                badgeContainer.className = 'space-y-1';
                
                dayTasks.forEach(task => {
                    const badge = document.createElement('span');
                    const statusClass = task.status === 'Concluído' ? 'done' : (task.status === 'Em andamento' ? 'progress' : 'todo');
                    badge.className = `task-badge ${statusClass}`;
                    badge.textContent = task.equipamento;
                    badge.title = `${task.cliente}: ${task.equipamento}`;
                    badgeContainer.appendChild(badge);
                });
                
                dayDiv.appendChild(badgeContainer);
            }

            grid.appendChild(dayDiv);
        }

        function changeMonth(delta) {
            currentDate.setMonth(currentDate.getMonth() + delta);
            renderCalendar();
        }

        function goToToday() {
            currentDate = new Date();
            renderCalendar();
        }

        // Initial Load
        fetchTasks();
    </script>
</body>
</html>
